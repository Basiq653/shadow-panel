<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            background: linear-gradient(135deg, #0a0a0a, #1a0033);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: #e0e0e0;
        }
        .login-container {
            background: rgba(20, 20, 30, 0.95);
            padding: 50px 40px;
            border-radius: 20px;
            border: 1px solid #00ff9d33;
            width: 420px;
            box-shadow: 0 0 40px rgba(0, 255, 157, 0.15);
            text-align: center;
        }
        .logo {
            font-size: 42px;
            font-weight: 800;
            color: #00ff9d;
            margin-bottom: 10px;
            letter-spacing: 4px;
        }
        .subtitle {
            color: #888;
            margin-bottom: 40px;
        }
        input {
            width: 100%;
            padding: 16px 20px;
            margin: 12px 0;
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            transition: 0.3s;
        }
        input:focus {
            border-color: #00ff9d;
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 255, 157, 0.1);
        }
        button {
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-login {
            background: linear-gradient(90deg, #00ff9d, #00cc7a);
            color: #000;
        }
        .btn-register {
            background: #222;
            color: #aaa;
        }
        .btn-login:hover { transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo">SHADOW</div>
        <div class="subtitle">PANEL</div>
        
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Пароль">
        
        <button class="btn-login" onclick="login()">Войти</button>
        <button class="btn-register" onclick="register()">Зарегистрироваться</button>
        
        <p id="status" style="margin-top:15px; min-height:24px; color:#0f0;"></p>
    </div>

    <script>
        const supabase = Supabase.createClient(
            'https://bozcxkjhlhjslperttio.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJvemN4a2pobGhqc2xwZXJ0dGlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NTk1MjIsImV4cCI6MjA5ODQzNTUyMn0.oRfVst1Js9IwulNXZl_SqcnXXqybCzvIdgFvWcoDSYg'
        );

        async function register() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const status = document.getElementById('status');

            if (!email || password.length < 6) {
                status.style.color = '#ff6666';
                status.textContent = "Введите email и пароль (минимум 6 символов)";
                return;
            }

            status.style.color = '#ffff00';
            status.textContent = "Регистрация...";

            const { error } = await supabase.auth.signUp({ email, password });

            if (error) {
                status.style.color = '#ff6666';
                status.textContent = error.message;
            } else {
                status.style.color = '#00ff9d';
                status.textContent = "✅ Успешно! Теперь войдите.";
            }
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const status = document.getElementById('status');

            if (!email || !password) {
                status.style.color = '#ff6666';
                status.textContent = "Заполните все поля";
                return;
            }

            status.style.color = '#ffff00';
            status.textContent = "Вход...";

            const { error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                status.style.color = '#ff6666';
                status.textContent = error.message;
            } else {
                status.style.color = '#00ff9d';
                status.textContent = "✅ Вход выполнен! Загружаем панель...";
                setTimeout(() => {
                    alert("Панель управления (в разработке)");
                }, 800);
            }
        }
    </script>
</body>
</html>
