<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: #07070c;
            color: #e0e0e0;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            letter-spacing: 0.2px;
        }

        /* ========== АВТОРИЗАЦИЯ ========== */
        .login {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at 30% 30%, #14142a 0%, #07070c 70%);
            position: relative;
        }

        .login::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.03"><path d="M10 10 L90 10 L90 90 L10 90 Z" fill="none" stroke="white" stroke-width="0.5"/></svg>') repeat;
            pointer-events: none;
        }

        .card {
            background: rgba(12, 12, 18, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 44px;
            border-radius: 28px;
            width: 460px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(0, 255, 157, 0.15);
            transition: 0.3s ease;
            z-index: 2;
        }

        .card:hover {
            box-shadow: 0 35px 60px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(0, 255, 157, 0.3);
        }

        .card h1 {
            font-weight: 600;
            letter-spacing: 1.8px;
            font-size: 28px;
            margin-bottom: 32px;
            background: linear-gradient(135deg, #00ff9d, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .input-group {
            position: relative;
            margin: 18px 0;
        }

        .input-group i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #5a5a6e;
            font-size: 15px;
            transition: 0.3s;
            pointer-events: none;
        }

        .input-group input {
            width: 100%;
            padding: 15px 18px 15px 48px;
            background: rgba(20, 20, 30, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.25s;
            backdrop-filter: blur(5px);
        }

        .input-group input:focus {
            border-color: #00ff9d;
            box-shadow: 0 0 18px rgba(0, 255, 157, 0.2);
        }

        .input-group input:focus+i {
            color: #00ff9d;
        }

        button {
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            letter-spacing: 0.6px;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00ff9d, #00cc7a);
            color: #0a0a0a;
            font-weight: 700;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(0, 255, 157, 0.35);
        }
        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-outline {
            background: transparent;
            color: #b0b0c0;
            border: 1px solid #2a2a3a;
        }
        .btn-outline:hover {
            border-color: #00ff9d;
            color: #00ff9d;
            background: rgba(0, 255, 157, 0.04);
        }

        .btn-ghost {
            background: transparent;
            color: #7a7a8c;
            border: none;
            width: auto;
            display: inline;
            padding: 6px 14px;
            font-size: 14px;
            text-decoration: underline;
            text-underline-offset: 3px;
            cursor: pointer;
        }
        .btn-ghost:hover {
            color: #00ff9d;
        }

        .status-message {
            margin-top: 20px;
            font-size: 14px;
            min-height: 20px;
            font-weight: 500;
            transition: 0.3s;
            border-radius: 8px;
            padding: 8px 12px;
        }
        .status-message.error {
            color: #ff5e7a;
            background: rgba(255, 50, 70, 0.08);
        }
        .status-message.success {
            color: #00ff9d;
            background: rgba(0, 255, 157, 0.08);
        }
        .status-message.info {
            color: #ffb74d;
            background: rgba(255, 183, 77, 0.08);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #4a4a5a;
            font-size: 13px;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #222232;
        }
        .divider span {
            margin: 0 16px;
        }

        /* ========== ДЭШБОРД ========== */
        .dashboard {
            display: flex;
            height: 100%;
            background: #07070c;
        }

        .sidebar {
            width: 270px;
            background: rgba(10, 10, 16, 0.9);
            backdrop-filter: blur(16px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 32px 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            box-shadow: 4px 0 25px rgba(0, 0, 0, 0.6);
        }

        .sidebar h2 {
            font-weight: 600;
            letter-spacing: 1.5px;
            font-size: 21px;
            margin-bottom: 28px;
            padding-left: 14px;
            background: linear-gradient(135deg, #00ff9d, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-item {
            padding: 13px 16px;
            cursor: pointer;
            border-radius: 12px;
            transition: 0.25s;
            font-weight: 500;
            font-size: 15px;
            color: #9a9aae;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid transparent;
        }
        .nav-item i {
            width: 20px;
            text-align: center;
            font-size: 16px;
            color: #6a6a7e;
            transition: 0.25s;
        }
        .nav-item:hover {
            background: rgba(255, 255, 255, 0.04);
            color: #ddd;
            border-color: rgba(255, 255, 255, 0.06);
        }
        .nav-item:hover i {
            color: #00ff9d;
        }
        .nav-item.active {
            background: rgba(0, 255, 157, 0.08);
            color: #00ff9d;
            border-color: rgba(0, 255, 157, 0.25);
            box-shadow: 0 0 18px rgba(0, 255, 157, 0.1);
        }
        .nav-item.active i {
            color: #00ff9d;
        }

        .spacer {
            flex: 1;
        }

        .logout-btn {
            padding: 13px 16px;
            cursor: pointer;
            border-radius: 12px;
            transition: 0.25s;
            font-weight: 500;
            font-size: 15px;
            color: #f47282;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
        }
        .logout-btn:hover {
            background: rgba(244, 114, 130, 0.1);
            border: 1px solid rgba(244, 114, 130, 0.2);
        }
        .logout-btn i {
            color: #f47282;
        }

        .main {
            flex: 1;
            padding: 45px 55px;
            overflow-y: auto;
            background: #0b0b12;
            scrollbar-width: thin;
            scrollbar-color: #2a2a3a #0b0b12;
        }
        .main::-webkit-scrollbar {
            width: 6px;
        }
        .main::-webkit-scrollbar-track {
            background: #0b0b12;
        }
        .main::-webkit-scrollbar-thumb {
            background: #2a2a3a;
            border-radius: 6px;
        }

        .main h1 {
            font-size: 30px;
            font-weight: 600;
            margin-bottom: 14px;
            color: #f0f0f5;
            letter-spacing: -0.3px;
        }
        .main p {
            color: #9090a0;
            line-height: 1.7;
        }

        .card-content {
            background: rgba(18, 18, 26, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 22px;
            padding: 32px;
            margin-top: 22px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5);
            transition: 0.25s;
        }
        .card-content:hover {
            border-color: rgba(0, 255, 157, 0.15);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
        }

        .tag {
            display: inline-block;
            background: rgba(0, 255, 157, 0.1);
            color: #00ff9d;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.4px;
            border: 1px solid rgba(0, 255, 157, 0.25);
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid transparent;
            border-top-color: #0a0a0a;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .creator-badge {
            background: linear-gradient(135deg, #ffb347, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            margin-left: 8px;
            font-size: 14px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script>
        const supabaseClient = supabase.createClient(
            'https://bozcxkjhlhjslperttio.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJvemN4a2pobGhqc2xwZXJ0dGlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NTk1MjIsImV4cCI6MjA5ODQzNTUyMn0.oRfVst1Js9IwulNXZl_SqcnXXqybCzvIdgFvWcoDSYg'
        );

        let currentView = 'login';
        let activeNav = 'panel';
        let isCreator = false; // флаг создателя

        // ========== ОТОБРАЖЕНИЕ ФОРМЫ АВТОРИЗАЦИИ ==========
        function showAuthForm(view = 'login') {
            currentView = view;
            const isLogin = view === 'login';
            const title = 'SHADOW PANEL';
            const btnText = isLogin ? 'Войти' : 'Зарегистрироваться';
            const switchText = isLogin ? 'Нет аккаунта? Зарегистрироваться' : 'Уже есть аккаунт? Войти';
            const switchAction = isLogin ? "showAuthForm('register')" : "showAuthForm('login')";
            const onSubmit = isLogin ? 'handleLogin()' : 'handleRegister()';

            document.getElementById('root').innerHTML = `
            <div class="login">
              <div class="card">
                <h1>${title}</h1>
                <form id="authForm" onsubmit="event.preventDefault(); ${onSubmit}">
                  <div class="input-group">
                    <input type="email" id="email" placeholder="Email" required autocomplete="email">
                    <i class="fas fa-envelope"></i>
                  </div>
                  <div class="input-group">
                    <input type="password" id="password" placeholder="Пароль (минимум 6 символов)" required minlength="6" autocomplete="${isLogin ? 'current-password' : 'new-password'}">
                    <i class="fas fa-lock"></i>
                  </div>
                  ${!isLogin ? `
                  <div class="input-group">
                    <input type="password" id="passwordConfirm" placeholder="Подтвердите пароль" required minlength="6">
                    <i class="fas fa-check-circle"></i>
                  </div>` : ''}
                  <button type="submit" class="btn-primary" id="submitBtn">${btnText}</button>
                </form>
                <button class="btn-outline" onclick="${switchAction}">${switchText}</button>
                <div class="status-message" id="status"></div>
                ${isLogin ? `
                <div class="divider"><span>или</span></div>
                <button class="btn-ghost" onclick="showAuthForm('register')">Создать новый аккаунт</button>` : ''}
              </div>
            </div>
          `;
        }

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function setStatus(message, type = 'error') {
            const statusEl = document.getElementById('status');
            if (!statusEl) return;
            statusEl.textContent = message;
            statusEl.className = 'status-message ' + type;
        }

        function setLoading(isLoading) {
            const btn = document.getElementById('submitBtn');
            if (!btn) return;
            if (isLoading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span> Загрузка...';
            } else {
                btn.disabled = false;
                btn.textContent = currentView === 'login' ? 'Войти' : 'Зарегистрироваться';
            }
        }

        async function handleRegister() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('passwordConfirm')?.value;

            if (!email || !password) {
                setStatus('Заполните все поля', 'error');
                return;
            }
            if (!isValidEmail(email)) {
                setStatus('Некорректный email', 'error');
                return;
            }
            if (password.length < 6) {
                setStatus('Пароль должен быть не менее 6 символов', 'error');
                return;
            }
            if (passwordConfirm !== undefined && password !== passwordConfirm) {
                setStatus('Пароли не совпадают', 'error');
                return;
            }

            setLoading(true);
            setStatus('');

            const { data, error } = await supabaseClient.auth.signUp({ email, password });
            setLoading(false);

            if (error) {
                if (error.message.includes('already registered') || error.message.includes('already exists')) {
                    setStatus('Пользователь с таким email уже существует.', 'error');
                } else {
                    setStatus('Ошибка: ' + error.message, 'error');
                }
                return;
            }

            if (data?.user?.identities?.length === 0) {
                setStatus('Пользователь уже существует. Войдите.', 'error');
                return;
            }

            if (data?.session === null) {
                setStatus('Регистрация успешна! Проверьте почту для подтверждения.', 'success');
                document.getElementById('email').value = '';
                document.getElementById('password').value = '';
                if (document.getElementById('passwordConfirm')) document.getElementById('passwordConfirm').value = '';
                setTimeout(() => {
                    showAuthForm('login');
                    setStatus('Теперь можно войти после подтверждения email.', 'info');
                }, 3000);
            } else {
                setStatus('Регистрация успешна! Выполняется вход...', 'success');
                setTimeout(() => showDashboard(), 800);
            }
        }

        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                setStatus('Заполните все поля', 'error');
                return;
            }
            if (!isValidEmail(email)) {
                setStatus('Некорректный email', 'error');
                return;
            }

            setLoading(true);
            setStatus('');

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            setLoading(false);

            if (error) {
                if (error.message.includes('Invalid login credentials')) {
                    setStatus('Неверный email или пароль', 'error');
                } else if (error.message.includes('Email not confirmed')) {
                    setStatus('Email не подтверждён. Проверьте почту.', 'error');
                } else {
                    setStatus('Ошибка: ' + error.message, 'error');
                }
                return;
            }

            if (data?.session) {
                setStatus('Вход выполнен!', 'success');
                setTimeout(() => showDashboard(), 500);
            } else {
                setStatus('Не удалось войти.', 'error');
            }
        }

        // ========== ДЭШБОРД ==========
        async function showDashboard() {
            currentView = 'dashboard';
            // Определяем, является ли пользователь создателем
            const { data: { user } } = await supabaseClient.auth.getUser();
            isCreator = (user?.email === 'kilersosiska130@gmail.com');

            document.getElementById('root').innerHTML = `
            <div class="dashboard">
              <div class="sidebar">
                <h2>SHADOW<span class="creator-badge">${isCreator ? 'CREATOR' : ''}</span></h2>
                <div class="nav-item ${activeNav === 'panel' ? 'active' : ''}" onclick="showPanel()">
                  <i class="fas fa-tachometer-alt"></i> Панель
                </div>
                <div class="nav-item ${activeNav === 'builder' ? 'active' : ''}" onclick="showBuilder()">
                  <i class="fas fa-cubes"></i> Builder
                </div>
                <div class="nav-item ${activeNav === 'subs' ? 'active' : ''}" onclick="showSubs()">
                  <i class="fas fa-crown"></i> Подписки
                </div>
                <div class="nav-item ${activeNav === 'settings' ? 'active' : ''}" onclick="showSettings()">
                  <i class="fas fa-gear"></i> Настройки
                </div>
                <div class="spacer"></div>
                <div class="logout-btn" onclick="handleLogout()">
                  <i class="fas fa-right-from-bracket"></i> Выйти
                </div>
              </div>
              <div class="main" id="content">
                ${getPanelContent()}
              </div>
            </div>
          `;
            updateActiveNav(activeNav);
        }

        function getPanelContent() {
            return `
            <h1>Панель управления</h1>
            <p>Добро пожаловать в <span class="tag">Shadow Panel</span></p>
            <div class="card-content">
              <p><i class="fas fa-check-circle" style="color:#00ff9d;"></i> Вы успешно авторизованы</p>
              <p style="margin-top:10px;">Выберите раздел в меню слева, чтобы продолжить.</p>
              ${isCreator ? '<p style="margin-top:12px; color:#ffb347;"><i class="fas fa-star"></i> Статус создателя активен — все модули разблокированы.</p>' : ''}
            </div>
          `;
        }

        function updateActiveNav(nav) {
            activeNav = nav;
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            const items = document.querySelectorAll('.nav-item');
            const navMap = { panel: 0, builder: 1, subs: 2, settings: 3 };
            if (items[navMap[nav]]) {
                items[navMap[nav]].classList.add('active');
            }
        }

        function showBuilder() {
            updateActiveNav('builder');
            const contentDiv = document.getElementById('content');
            if (!contentDiv) return;

            if (isCreator) {
                contentDiv.innerHTML = `
                <h1>Builder</h1>
                <div class="card-content">
                  <p><i class="fas fa-unlock" style="color:#00ff9d;"></i> Доступ открыт (создатель)</p>
                  <p style="margin-top:12px;">Инструменты разработчика активны. Вы можете настраивать модули системы.</p>
                  <div style="margin-top:20px; display:flex; gap:15px; flex-wrap:wrap;">
                    <div style="background:#12121f; border:1px solid #2a2a3a; border-radius:14px; padding:18px; width:160px;">
                      <i class="fas fa-code" style="color:#00ff9d; font-size:20px;"></i>
                      <p style="margin-top:8px; font-weight:600;">Редактор</p>
                    </div>
                    <div style="background:#12121f; border:1px solid #2a2a3a; border-radius:14px; padding:18px; width:160px;">
                      <i class="fas fa-database" style="color:#00ff9d; font-size:20px;"></i>
                      <p style="margin-top:8px; font-weight:600;">Данные</p>
                    </div>
                  </div>
                </div>
              `;
            } else {
                contentDiv.innerHTML = `
                <h1>Builder</h1>
                <div class="card-content">
                  <p><i class="fas fa-lock" style="color:#ffb74d;"></i> Этот раздел доступен по подписке.</p>
                  <p style="margin-top:12px;">Перейдите в <strong>Подписки</strong>, чтобы активировать доступ.</p>
                  <button class="btn-outline" style="width:auto; margin-top:16px; padding:12px 24px;" onclick="showSubs()">
                    <i class="fas fa-crown"></i> Перейти к подпискам
                  </button>
                </div>
              `;
            }
        }

        function showPanel() {
            updateActiveNav('panel');
            const contentDiv = document.getElementById('content');
            if (contentDiv) contentDiv.innerHTML = getPanelContent();
        }

        function showSubs() {
            updateActiveNav('subs');
            const contentDiv = document.getElementById('content');
            if (contentDiv) {
                contentDiv.innerHTML = `
                <h1>Подписки</h1>
                <div class="card-content">
                  <p><strong>1 месяц</strong> — <span style="color:#00ff9d; font-size:20px;">500₽</span></p>
                  <p style="margin-top:8px; color:#9090a0;">Полный доступ к Builder и всем инструментам.</p>
                  <button class="btn-primary" style="width:auto; margin-top:16px; padding:12px 28px;" disabled>
                    <i class="fas fa-credit-card"></i> Оплатить (скоро)
                  </button>
                  <p style="margin-top:12px; font-size:13px; color:#5a5a6e;">Платёжная система в разработке.</p>
                  ${isCreator ? '<p style="margin-top:12px; color:#ffb347;">Вы создатель — подписка не требуется.</p>' : ''}
                </div>
              `;
            }
        }

        function showSettings() {
            updateActiveNav('settings');
            const contentDiv = document.getElementById('content');
            if (contentDiv) {
                contentDiv.innerHTML = `
                <h1>Настройки</h1>
                <div class="card-content">
                  <p>Управление аккаунтом и безопасность.</p>
                  <p style="margin-top:12px; color:#9090a0;">Email: <strong id="userEmail">загрузка...</strong></p>
                  <button class="btn-outline" style="width:auto; margin-top:20px; padding:12px 24px;" onclick="handleLogout()">
                    <i class="fas fa-right-from-bracket"></i> Выйти из аккаунта
                  </button>
                </div>
              `;
                loadUserEmail();
            }
        }

        async function loadUserEmail() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const emailEl = document.getElementById('userEmail');
            if (emailEl && user?.email) {
                emailEl.textContent = user.email;
            } else if (emailEl) {
                emailEl.textContent = 'неизвестно';
            }
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            currentView = 'login';
            activeNav = 'panel';
            isCreator = false;
            showAuthForm('login');
        }

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        window.onload = async () => {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) {
                    const { data: { user } } = await supabaseClient.auth.getUser();
                    if (user) {
                        // Установим isCreator до рендера дашборда
                        isCreator = (user.email === 'kilersosiska130@gmail.com');
                        showDashboard();
                        return;
                    }
                }
                showAuthForm('login');
            } catch (e) {
                console.error('Ошибка инициализации:', e);
                showAuthForm('login');
            }
        };

        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_OUT') {
                currentView = 'login';
                activeNav = 'panel';
                isCreator = false;
                showAuthForm('login');
            } else if (event === 'SIGNED_IN' && session) {
                if (currentView !== 'dashboard') {
                    // обновим isCreator перед показом
                    supabaseClient.auth.getUser().then(({ data: { user } }) => {
                        isCreator = (user?.email === 'kilersosiska130@gmail.com');
                        showDashboard();
                    });
                }
            }
        });
    </script>
